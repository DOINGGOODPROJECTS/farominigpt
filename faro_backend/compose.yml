services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: faro_minigpt_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      PORT: "5030"
      HOSTNAME: "0.0.0.0"
    ports:
      - "5030:5030"
